services:

  app:
    build: .
    ports:
      - "5000:5000"

    depends_on:
      - db

  db:
    image: postgres:16

    environment:
      POSTGRES_DB: studentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: